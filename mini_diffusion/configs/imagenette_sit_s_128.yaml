name: imagenette_sit_s_128
seed: 123
output_dir: outputs/imagenette_sit_s_128
data:
  dataset: imagenette-160
  root: datasets/imagenette
  cache_dir: outputs/imagenette_sit_s_128/latents
  resolution: 128
  latent_resolution: 16
  num_classes: 10
  cache_seed: 123
  prepare_batch_size: 32
  batch_size: 256
  num_workers: 4
vae:
  model_id: stabilityai/sd-vae-ft-mse
  revision: null
model:
  patch_size: 2
  hidden_size: 384
  depth: 12
  num_heads: 6
  mlp_ratio: 4.0
  cond_drop_prob: 0.1
train:
  max_steps: 400000
  learning_rate: 0.0001
  weight_decay: 0.01
  grad_accum_steps: 1
  grad_clip: 1.0
  ema_decay: 0.9999
  dtype: bf16
  log_every: 50
  save_every: 5000
  sample_every: 5000
performance:
  fused_adamw: true
  ema_foreach: true
  cudnn_benchmark: true
sampling:
  preview_sampler: heun
  preview_steps: 50
  preview_seed: 123
  preview_count: 16
  guidance_scale: 1.5
